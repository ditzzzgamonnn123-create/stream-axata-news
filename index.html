<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axata Loading Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-blue: #0ea5e9;
            --dark-bg: #020617;
            --glass-blue: rgba(14, 165, 233, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #0a192f, #020617);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #particles-js {
            position: absolute; width: 100%; height: 100%;
            z-index: 0;
        }

        .main-wrapper {
            position: relative; z-index: 10; width: 90%; max-width: 400px;
            text-align: center; animation: iosAppear 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .video-container {
            width: 100%; aspect-ratio: 16/9;
            background: var(--glass-blue);
            border-radius: 24px; 
            border: 1px solid rgba(14, 165, 233, 0.3);
            overflow: hidden; position: relative;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            margin-bottom: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.6;
        }

        .app-info h1 {
            font-size: 32px; font-weight: 800; margin: 0;
            background: linear-gradient(135deg, #fff, #38bdf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .app-info p {
            font-size: 13px; color: #94a3b8; margin: 8px 0 30px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .ios-loader {
            display: inline-block; position: relative;
            width: 40px; height: 40px; margin-bottom: 20px;
        }
        .ios-loader div {
            transform-origin: 20px 20px; animation: ios-loader 1.2s linear infinite;
        }
        .ios-loader div:after {
            content: " "; display: block; position: absolute;
            top: 3px; left: 18px; width: 3.5px; height: 10px;
            border-radius: 20%; background: var(--primary-blue);
            box-shadow: 0 0 8px var(--primary-blue);
        }
        .ios-loader div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .ios-loader div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .ios-loader div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .ios-loader div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .ios-loader div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .ios-loader div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .ios-loader div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .ios-loader div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .ios-loader div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .ios-loader div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .ios-loader div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .ios-loader div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }

        @keyframes ios-loader { 0% { opacity: 1; } 100% { opacity: 0.1; } }
        @keyframes iosAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ios-swal-popup {
            border-radius: 24px !important;
            padding: 25px !important;
            background: rgba(15, 23, 42, 0.85) !important;
            backdrop-filter: blur(25px) !important; -webkit-backdrop-filter: blur(25px) !important;
            border: 1px solid rgba(56, 189, 248, 0.2) !important;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5) !important;
        }
        .ios-swal-title { color: #f8fafc !important; font-size: 19px !important; font-weight: 700 !important; }
        .ios-swal-html { color: #94a3b8 !important; font-size: 14px !important; line-height: 1.5; }
        .swal2-timer-progress-bar { background: var(--primary-blue) !important; }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-wrapper" id="content">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="https://files.catbox.moe/kv1tm7.mp4" type="video/mp4">
            </video>
        </div>

        <div class="app-info">
            <h1>Axata</h1>
            <p>Made By hmmodz</p>
            
            <div class="ios-loader">
                <div></div><div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#0ea5e9" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 0.8, "direction": "top", "random": true, "straight": false, "out_mode": "out" }
            }
        });

        setTimeout(() => {
            const content = document.getElementById('content');
            content.style.transition = 'all 1s cubic-bezier(0.4, 0, 0.2, 1)';
            content.style.opacity = '0.4';
            content.style.filter = 'blur(4px)';

            Swal.fire({
                title: 'Authenticating...',
                html: 'Menghubungkan ke Server Axata<br>Mohon tunggu <b></b>',
                timer: 4500,
                timerProgressBar: true,
                allowOutsideClick: false,
                showConfirmButton: false,
                customClass: {
                    popup: 'ios-swal-popup',
                    title: 'ios-swal-title',
                    htmlContainer: 'ios-swal-html'
                },
                didOpen: () => {
                    Swal.showLoading();
                    const b = Swal.getHtmlContainer().querySelector('b');
                    const timerInterval = setInterval(() => {
                        const left = Swal.getTimerLeft();
                        if(left) b.textContent = Math.ceil(left / 1000) + 's';
                    }, 100);
                }
            }).then(() => {
                document.body.style.opacity = '0';
                document.body.style.transform = 'scale(1.1)';
                document.body.style.transition = '1s ease-in-out';
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1000);
            });
        }, 4000);
    </script>
</body>
</html>
