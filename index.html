<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XETA AXATA - Loading</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-blue: #00dbde;
            --system-blue: #007AFF;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden;
        }

        .video-background {
            position: fixed;
            inset: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) blur(2px);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        .loading-container {
            text-align: center;
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner-ios {
            width: 35px;
            height: 35px;
            display: inline-block;
            position: relative;
        }

        .spinner-ios div {
            transform-origin: 17.5px 17.5px;
            animation: spinner-ios 1.2s linear infinite;
        }

        .spinner-ios div:after {
            content: " ";
            display: block;
            position: absolute;
            top: 2px;
            left: 16px;
            width: 3px;
            height: 9px;
            border-radius: 20%;
            background: #ffffff;
        }

        .spinner-ios div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .spinner-ios div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .spinner-ios div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .spinner-ios div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .spinner-ios div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .spinner-ios div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .spinner-ios div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .spinner-ios div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .spinner-ios div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .spinner-ios div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .spinner-ios div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .spinner-ios div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }

        @keyframes spinner-ios {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .status-text {
            color: white;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        #ios-alert-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .ios-alert {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 14px;
            width: 270px;
            overflow: hidden;
            animation: alertPop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }

        @keyframes alertPop {
            from { transform: scale(1.2); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .alert-content {
            padding: 20px 16px;
            text-align: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.2);
        }

        .alert-content h4 { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: #000; }
        .alert-content p { font-size: 13px; color: #000; line-height: 1.4; }

        .alert-action {
            display: block;
            padding: 12px;
            text-align: center;
            color: var(--system-blue);
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .alert-action:active { background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="https://files.catbox.moe/acr35m.mp4" type="video/mp4">
        </video>
    </div>
    
    <div class="overlay"></div>

    <div class="loading-container">
        <div class="spinner-ios">
            <div></div><div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
        <div class="status-text" id="loader-msg">Authentication To Server...</div>
    </div>

    <div id="ios-alert-overlay">
        <div class="ios-alert">
            <div class="alert-content">
                <h4>XETA AXATA</h4>
                <p>Koneksi Berhasil! Anda akan dialihkan dalam <span id="timer">8</span> detik.</p>
            </div>
            <a href="home.html" class="alert-action">Masuk Sekarang</a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const loadingTime = 3000; 
            const redirectTime = 8;
            
            setTimeout(() => {
                const overlay = document.getElementById('ios-alert-overlay');
                const timerEl = document.getElementById('timer');
                let timeLeft = redirectTime;

                overlay.style.display = 'flex';

                const countdown = setInterval(() => {
                    timeLeft--;
                    timerEl.textContent = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        window.location.href = 'home.html';
                    }
                }, 1000);
            }, loadingTime);
        });
    </script>
</body>
</html>
