<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axata Hub Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background: #02040a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(10, 132, 255, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 45px 25px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .version-badge {
            display: inline-block;
            background: rgba(10, 132, 255, 0.1);
            color: #0a84ff;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
            border: 1px solid rgba(10, 132, 255, 0.2);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 30px;
            margin: 0 auto 20px;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .app-info h1 {
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .app-info p {
            font-size: 13px;
            color: #4b5563;
            margin-top: 8px;
        }

        .menu-grid {
            display: grid;
            gap: 15px;
            margin-top: 40px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-item:hover {
            background: rgba(10, 132, 255, 0.05);
            border-color: rgba(10, 132, 255, 0.3);
            transform: translateY(-2px);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 18px;
            background: rgba(10, 132, 255, 0.1);
            color: #0a84ff;
        }

        .icon-box svg {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 8px #0a84ff);
        }

        .text-box {
            text-align: left;
        }

        .text-box h3 {
            font-size: 16px;
            font-weight: 600;
            color: #f3f4f6;
        }

        .text-box p {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
        }

        .footer {
            margin-top: 40px;
            font-size: 9px;
            color: #374151;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .swal2-ios-dark {
            border-radius: 25px !important;
            background: #0f1117 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="glass-card">
            <div class="version-badge">V1.1 - Premium Only</div>
            
            <img src="https://files.catbox.moe/dr64d4.png" class="profile-img">

            <div class="app-info">
                <h1>Axata Hub</h1>
                <p>Created by <b>HM MODZ TEAM</b></p>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="launch('Anime 18+', 'https://nontonhentai.net/?ref=porndude')">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </div>
                    <div class="text-box">
                        <h3>Anime 18+</h3>
                        <p>Adult Contect</p>
                    </div>
                </div>

                <div class="menu-item" onclick="launch('Manhwa 18+', 'https://www.manhwaland.baby/')">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M7 2v20M17 2v20M2 7h20M2 17h20"></path>
                        </svg>
                    </div>
                    <div class="text-box">
                        <h3>Manhwa 18+</h3>
                        <p>Adult Contect</p>
                    </div>
                </div>
            </div>

            <div class="footer">© AXATA TEAM • 2026</div>
        </div>
    </div>

    <script>
        function launch(name, url) {
            Swal.fire({
                title: 'Konfirmasi Akses',
                text: `Masuk ke layanan ${name}?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Buka',
                cancelButtonText: 'Batal',
                background: '#0f1117',
                color: '#fff',
                confirmButtonColor: '#0a84ff',
                customClass: {
                    popup: 'swal2-ios-dark'
                }
            }).then((result) => {
                if (result.isConfirmed) window.location.href = url;
            });
        }
    </script>
</body>
</html>
