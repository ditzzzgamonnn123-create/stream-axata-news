<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XETA AXATA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000;
            --ios-blue: #00dbde;
            --ios-pink: #fc00ff;
            --ios-border: rgba(255, 255, 255, 0.2);
            --ios-text: #FFFFFF;
            --ios-sub: rgba(255, 255, 255, 0.5);
            --system-blue: #007AFF;
            --system-red: #FF3B30;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--ios-bg);
            color: var(--ios-text);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        #bg-video-container {
            position: fixed; inset: 0; z-index: -2; 
            width: 100%; height: 100%;
        }

        #bg-video-container video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.4) saturate(1.2);
        }

        .glass-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: -1;
        }

        .container {
            width: 100%; max-width: 400px; margin: 0 auto;
            padding: 20px; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 1;
        }

        header {
            width: 100%; text-align: center; margin-bottom: 25px; margin-top: 10px;
        }

        h1 {
            font-size: 32px; font-weight: 800; letter-spacing: -1.5px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .status-pill {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(0, 219, 222, 0.1);
            border: 0.5px solid rgba(0, 219, 222, 0.3);
            padding: 3px 10px; border-radius: 20px;
            font-size: 9px; font-weight: 700; color: #00dbde;
            text-transform: uppercase; margin-top: 5px;
        }

        .pulse {
            width: 5px; height: 5px; background: #00dbde;
            border-radius: 50%; animation: pulse-anim 2s infinite;
        }

        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(0, 219, 222, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(0, 219, 222, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 219, 222, 0); }
        }

        .video-box {
            width: 100%; aspect-ratio: 16/9; margin-bottom: 25px;
            border-radius: 25px; overflow: hidden;
            border: 1px solid var(--ios-border);
            background: #000;
        }

        .video-box video { width: 100%; height: 100%; object-fit: cover; }

        .subtitle {
            font-size: 11px; color: var(--ios-sub);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .buttons-container {
            width: 100%; display: flex; flex-direction: column; gap: 12px;
        }

        .btn {
            padding: 16px; border-radius: 20px;
            color: white; font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--ios-border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center; font-size: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.15); }
        .btn-primary { border-bottom: 2.5px solid var(--ios-blue); }
        .btn-dev { border-bottom: 2.5px solid var(--ios-pink); }

        /* LOADING SCREEN STYLES */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--ios-blue);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }

        .loader-text {
            margin-top: 15px; color: var(--ios-blue);
            font-size: 12px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ALERT STYLES */
        #ios-alert-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 2000; display: none; justify-content: center; align-items: center;
        }

        .ios-alert {
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 14px; width: 275px; text-align: center;
            animation: alertPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden; border: 0.5px solid rgba(255,255,255,0.15);
        }

        @keyframes alertPop { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .alert-body { padding: 22px 16px; }
        .alert-body h4 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .alert-body p { font-size: 14px; line-height: 1.4; opacity: 0.8; }

        .alert-footer { display: flex; border-top: 0.5px solid rgba(255,255,255,0.2); }
        .alert-btn {
            flex: 1; padding: 14px; font-size: 17px; cursor: pointer;
            background: transparent; border: none;
        }

        .alert-btn:active { background: rgba(255,255,255,0.1); }
        .btn-cancel { color: var(--system-red); border-right: 0.5px solid rgba(255,255,255,0.2); }
        .btn-connect { color: var(--system-blue); font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Connecting...</div>
    </div>

    <div id="ios-alert-overlay">
        <div class="ios-alert">
            <div class="alert-body">
                <h4 id="alert-title">Akses Fitur</h4>
                <p id="alert-msg">Apakah Anda yakin ingin membuka halaman ini?</p>
            </div>
            <div class="alert-footer">
                <div class="alert-btn btn-cancel" onclick="closeAlert()">Batal</div>
                <div class="alert-btn btn-connect" id="alert-confirm">Lanjut</div>
            </div>
        </div>
    </div>

    <div id="bg-video-container">
        <video loop muted autoplay playsinline>
            <source src="https://files.catbox.moe/acr35m.mp4" type="video/mp4" />
        </video>
    </div>
    <div class="glass-overlay"></div>

    <div class="container">
        <header>
            <h1>Xeta Axata</h1>
            <div class="status-pill">
                <div class="pulse"></div> Server Online
            </div>
        </header>

        <div class="video-box">
            <video loop muted autoplay playsinline>
                <source src="https://files.catbox.moe/pm3xla.mp4" type="video/mp4" />
            </video>
        </div>
        
        <p class="subtitle">Welcome To Xeta Axata</p>

        <div class="buttons-container">
            <div onclick="requestAccess('Beranda', 'beranda/index.html')" class="btn btn-primary">
                <i class="fa-solid fa-house"></i> Beranda
            </div>
            <div onclick="requestAccess('Developer', 'profile/index.html')" class="btn btn-dev">
                <i class="fa-solid fa-code"></i> Developer
            </div>
            <div onclick="requestAccess('Stream', 'stream/index.html')" class="btn btn-primary">
                <i class="fa-solid fa-play"></i> STREAM
            </div>
        </div>

        <h5 style="margin-top: auto; padding-bottom: 20px; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 1px;">AXATA &bull; 2026</h5>
    </div>

    <script>
        let targetUrl = '';

        function requestAccess(name, url) {
            targetUrl = url;
            document.getElementById('alert-title').innerText = name;
            document.getElementById('alert-msg').innerText = 'Hubungkan ke server ' + name + '?';
            document.getElementById('ios-alert-overlay').style.display = 'flex';
            
            document.getElementById('alert-confirm').onclick = function() {
                closeAlert();
                showLoading();
            };
        }

        function showLoading() {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1200);
        }

        function closeAlert() {
            document.getElementById('ios-alert-overlay').style.display = 'none';
        }

        window.addEventListener('load', () => {
            const vids = document.querySelectorAll('video');
            vids.forEach(v => v.play().catch(() => {}));
        });
    </script>
</body>
</html>
