<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axata Hub Premium v6.3</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background: #020617;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            z-index: -1;
            animation: pulseBg 8s ease-in-out infinite alternate;
        }

        @keyframes pulseBg { from { opacity: 0.5; } to { opacity: 1; } }

        .container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: cardEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .version-tag {
            display: inline-block;
            background: linear-gradient(90deg, #0ea5e9, #6366f1);
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3);
        }

        .profile-box {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 35px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .app-info h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-info p {
            font-size: 13px;
            color: #64748b;
            margin-top: 10px;
            line-height: 1.5;
        }

        .menu-grid {
            display: grid;
            gap: 15px;
            margin-top: 35px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.03) translateX(5px);
        }

        .icon-wrap {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            position: relative;
            flex-shrink: 0;
        }

        .icon-wrap svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 5px currentColor);
        }

        .text-wrap { text-align: left; }
        .text-wrap h3 { font-size: 16px; font-weight: 700; color: #f1f5f9; }
        .text-wrap p { font-size: 11px; color: #64748b; margin-top: 2px; }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #334155;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .swal2-ios {
            border-radius: 30px !important;
            background: rgba(20, 20, 25, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        .swal2-title-ios { color: #fff !important; font-size: 20px !important; }
        .swal2-confirm-ios { 
            background: #0ea5e9 !important; border-radius: 15px !important; 
            padding: 12px 35px !important; font-weight: 600 !important;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3) !important;
        }
    </style>
</head>
<body>

    <div class="mesh-gradient"></div>

    <div class="container">
        <div class="glass-card">
            <div class="version-tag">VERSION 1.0 BETA</div>
            
            <div class="profile-box">
                <img src="https://files.catbox.moe/dr64d4.png" class="profile-img" alt="Alya">
            </div>

            <div class="app-info">
                <h1>Axata Hub</h1>
                <p>Diciptakan Oleh <b>Axata Dev</b> dan <b>hmmodzvip</b>.</p>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="nav('Anime Stream', 'https://s11.nontonanimeid.boats')">
                    <div class="icon-wrap" style="color: #0ea5e9; background: rgba(14, 165, 233, 0.15);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </div>
                    <div class="text-wrap">
                        <h3>Anime Stream</h3>
                        <p>Nonton Anime Tanpa Iklan Dan Terupdate.</p>
                    </div>
                </div>

                <div class="menu-item" onclick="nav('Donghua Stream', 'https://donghub.vip/')">
                    <div class="icon-wrap" style="color: #f59e0b; background: rgba(245, 158, 11, 0.15);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <div class="text-wrap">
                        <h3>Donghua Stream</h3>
                        <p>Nonton Donghua Dengan Kualitas Terbaik.</p>
                    </div>
                </div>

                <div class="menu-item" onclick="nav('Stream Film', 'https://tv9.lk21official.cc/')">
                    <div class="icon-wrap" style="color: #ec4899; background: rgba(236, 72, 153, 0.15);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </div>
                    <div class="text-wrap">
                        <h3>Film Stream</h3>
                        <p>Nonton Film Dengan Gratis.</p>
                    </div>
                </div>

                <div class="menu-item" onclick="nav('Vip Fiture', 'login.html')">
                    <div class="icon-wrap" style="color: #8b5cf6; background: rgba(139, 92, 246, 0.15);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M7 2v20M17 2v20M2 7h20M2 17h20"></path>
                        </svg>
                    </div>
                    <div class="text-wrap">
                        <h3>Vip Fiture</h3>
                        <p>Fitur Berbayar Khusus Pelanggan Premium.</p>
                    </div>
                </div>
            </div>

            <div class="footer">HM MODZ TEAM • 2026</div>
        </div>
    </div>

    <script>
        function nav(title, url) {
            Swal.fire({
                title: 'System Confirmation',
                text: `Masuk ke server ${title} sekarang?`,
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Lanjutkan',
                cancelButtonText: 'Batal',
                reverseButtons: true,
                background: '#0f172a',
                color: '#fff',
                customClass: {
                    popup: 'swal2-ios',
                    title: 'swal2-title-ios',
                    confirmButton: 'swal2-confirm-ios'
                }
            }).then((res) => {
                if (res.isConfirmed) window.location.href = url;
            });
        }
    </script>
</body>
</html>
